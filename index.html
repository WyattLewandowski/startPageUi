<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard UI</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
margin:0;
background:#0f0f4a;
color:white;
height:100vh;
overflow:hidden;
}

/* MAIN LAYOUT */

.wrapper{
display:grid;
grid-template-columns:150px 1fr;
height:20vh;
gap:18px;
padding:18px;
}

/* SIDEBAR */

.sidebar{
background:#565a88;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
padding:14px;
gap:16px;
}

/* SIDEBAR BUTTONS */

.sidebar-btn{
width:100%;
background:#6d71a6;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
position:relative;
}

/* ICON BUTTONS */

.icon-btn{
width:80px;
aspect-ratio:1/1;
background:#6d71a6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
position:relative;
}

/* PUSHES ALL APPS TO BOTTOM */

.all-apps{
margin-top:auto;
}

/* MAIN CONTENT */

.main{
display:grid;
grid-template-rows:auto 1.3fr 0.7fr;
gap:20px;
}

/* SEARCH BAR */

.search{
width:55%;
max-width:600px;
margin:auto;
background:#666aa0;
border-radius:24px;
padding:12px;
text-align:center;
}

/* PANELS */

.panel{
background:#666aa0;
border-radius:20px;
padding:12px;
display:flex;
flex-direction:column;
}

.panel-title{
text-align:center;
margin-bottom:10px;
font-size:14px;
}

/* RECENT APPS GRID */

.apps{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:14px;
padding:10px;
}

/* APP BOX */

.app{
background:#9397bf;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
aspect-ratio:1/1;
cursor:pointer;
position:relative;
}

/* NOTIFICATIONS GRID */

.notifications{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
padding:10px;
}

/* NOTIFICATION CARD */

.note{
background:#9397bf;
border-radius:16px;
padding:16px;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
}

/* TOOLTIPS */

.tooltip{
position:absolute;
bottom:115%;
left:50%;
transform:translateX(-50%);
background:#8c90bd;
padding:8px 10px;
border-radius:10px;
font-size:12px;
white-space:nowrap;
opacity:0;
pointer-events:none;
transition:0.2s;
}

.sidebar-btn:hover .tooltip,
.icon-btn:hover .tooltip,
.app:hover .tooltip{
opacity:1;
}

/* SMALL SCREEN ADJUSTMENT */

@media (max-width:900px){

.wrapper{
grid-template-columns:110px 1fr;
}

.icon-btn{
width:60px;
}

.search{
width:80%;
}

}

</style>
<script>

function createApp(id) {
  const d = document.createElement("div");
  d.id = id;
  d.className = "app";
}





  
</script>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-btn">
Account/Settings
</div>

<div class="sidebar-btn">
Pinned Apps
</div>

<div class="icon-btn">
⚙
</div>

<div class="icon-btn">
🌀
</div>

<div class="icon-btn">
🔥
</div>

<div class="sidebar-btn all-apps">
All Apps
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- SEARCH -->

<div class="search">

<span class="search-icon">🔍</span>

<input 
type="text" 
class="search-input" 
placeholder="Search"
/>

</div>

<!-- RECENT APPS -->

<div class="panel">

<div class="panel-title">Recent Apps</div>

<div class="apps">

<div class="app">
⚙
<div class="tooltip">Tools Application</div>
</div>

<div class="app">
N
<div class="tooltip">Notes</div>
</div>

<div class="app">
✦
<div class="tooltip">Graphics Studio</div>
</div>

<div class="app">
☁

</div>

<div class="app">

</div>

</div>

</div>

<!-- NOTIFICATIONS -->

</div>

</div>

</div>

</body>
</html>
