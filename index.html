<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
margin:0;
background:#0e0e4f;
color:white;
height:100vh;
}

/* Layout */

.wrapper{
display:flex;
height:100vh;
width:100vw;
}

/* Sidebar */

.sidebar{
width:10vw;
min-width:120px;
background:#535789;
padding:1vh;
display:flex;
flex-direction:column;
align-items:center;
gap:1.5vh;
}

.sidebar-box{
width:100%;
background:#6c70a3;
border-radius:1vw;
text-align:center;
padding:1.5vh;
font-size:0.9vw;
min-font-size:12px;
}

.sidebar-icon{
width:70%;
aspect-ratio:1/1;
background:#6c70a3;
border-radius:1vw;
display:flex;
align-items:center;
justify-content:center;
font-size:2vw;
}

/* Main */

.main{
flex:1;
padding:2vh 3vw;
display:flex;
flex-direction:column;
}

/* Search */

.search{
width:60%;
margin:auto;
background:#64689c;
border-radius:2vw;
padding:1.2vh;
text-align:center;
font-size:1vw;
}

/* Panels */

.panel{
margin-top:3vh;
background:#64689c;
border-radius:1.5vw;
padding:1.5vh 1.5vw;
}

.panel-title{
text-align:center;
margin-bottom:1vh;
font-size:1vw;
}

/* Apps */

.apps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:1vw;
padding:1vh;
}

.app{
aspect-ratio:1/1;
background:#9095bc;
border-radius:1vw;
display:flex;
align-items:center;
justify-content:center;
font-size:2vw;
position:relative;
}

/* Tooltip */

.tooltip{
position:absolute;
top:-6vh;
left:0;
width:12vw;
background:#8e92bf;
padding:0.8vh;
border-radius:0.7vw;
font-size:0.7vw;
opacity:0;
transition:0.2s;
}

.app:hover .tooltip{
opacity:1;
}

/* Notifications */

.notifications{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:1vw;
padding:1vh;
}

.note{
background:#9095bc;
border-radius:1vw;
padding:1vh;
text-align:center;
font-size:0.9vw;
}

/* Small screen adjustments */

@media (max-width:900px){

.sidebar{
width:18vw;
}

.search{
width:80%;
font-size:14px;
}

.panel-title{
font-size:14px;
}

.note{
font-size:13px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="sidebar-box">Account</div>
<div class="sidebar-box">Pinned Apps</div>

<div class="sidebar-icon">⚙</div>
<div class="sidebar-icon">🌀</div>
<div class="sidebar-icon">🔥</div>

<div class="sidebar-box">All Apps</div>

</div>


<div class="main">

<div class="search">Search</div>


<div class="panel">

<div class="panel-title">Recent Apps</div>

<div class="apps">

<div class="app">
⚙
<div class="tooltip">
App description appears here when hovering over the app.
</div>
</div>

<div class="app">N</div>
<div class="app">✦</div>
<div class="app">☁</div>
<div class="app">C</div>

</div>

</div>


<div class="panel">

<div class="panel-title">Notifications</div>

<div class="notifications">

<div class="note">
03-01-2026<br>
Meeting scheduled<br>
at 11:00 AM
</div>

<div class="note">
02-27-2026<br>
System Update
</div>

</div>

</div>

</div>

</div>

</body>
</html>
