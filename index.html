<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
margin:0;
background:#10104a;
color:white;
height:100vh;
overflow:hidden;
}

/* MAIN LAYOUT */

.wrapper{
display:grid;
grid-template-columns:140px 1fr;
height:100vh;
gap:18px;
padding:18px;
}

/* SIDEBAR */

.sidebar{
background:#575a88;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
padding:14px;
gap:16px;
}

.sidebar-btn{
width:100%;
background:#6f73a6;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
position:relative;
}

/* ICON BUTTONS */

.icon-btn{
width:70px;
aspect-ratio:1/1;
background:#6f73a6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
position:relative;
}

/* MAIN AREA */

.main{
display:grid;
grid-template-rows:auto 1.3fr 0.7fr;

}

/* SEARCH BAR */

.search{
width:60%;
max-width:700px;
margin:auto;
background:#6a6ea0;
border-radius:22px;
padding:12px;
text-align:center;
}

/* PANELS */

.panel{
background:#6a6ea0;
border-radius:20px;
padding:12px;
display:flex;
flex-direction:column;
}

.panel-title{
text-align:center;
margin-bottom:10px;
font-size:14px;
}

/* RECENT APPS */

.apps{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
padding:10px;
}

.app{
background:#9397bf;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
aspect-ratio:1/1;
cursor:pointer;
position:relative;
}

/* NOTIFICATIONS */

.notifications{
flex:1;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:10px;
}

.note{
background:#9397bf;
border-radius:16px;
padding:16px;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
}

/* TOOLTIPS */

.tooltip{
position:absolute;
bottom:110%;
left:50%;
transform:translateX(-50%);
background:#8c90bd;
padding:8px 10px;
border-radius:10px;
font-size:12px;
white-space:nowrap;
opacity:0;
pointer-events:none;
transition:0.2s;
}

.sidebar-btn:hover .tooltip,
.icon-btn:hover .tooltip,
.app:hover .tooltip{
opacity:1;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-btn">
Account
<div class="tooltip">Account Settings</div>
</div>

<div class="sidebar-btn">
Pinned Apps

</div>

<div class="icon-btn">
⚙
<div class="tooltip">Settings</div>
</div>

<div class="icon-btn">
🌀
<div class="tooltip">App Manager</div>
</div>

<div class="icon-btn">
🔥
<div class="tooltip">System Tools</div>
</div>

<div class="sidebar-btn">
All Apps
<div class="tooltip">View all applications</div>
</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="search">Search</div>


<div class="panel">

<div class="panel-title">Recent Apps</div>

<div class="apps">

<div class="app">
⚙
<div class="tooltip">Tool App</div>
</div>

<div class="app">
N
<div class="tooltip">Notes</div>
</div>

<div class="app">
✦
<div class="tooltip">Graphics</div>
</div>

<div class="app">
☁
<div class="tooltip">Cloud Manager</div>
</div>

<div class="app">
C
<div class="tooltip">Consul</div>
</div>

</div>

</div>


<div class="panel">

<div class="panel-title">Notifications</div>

<div class="notifications">

<div class="note">
03-01-2026<br>
Meeting scheduled<br>
at 11:00 AM
</div>

<div class="note">
02-27-2026<br>
System Update
</div>

</div>

</div>

</div>

</div>

</body>
</html>
